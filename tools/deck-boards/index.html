<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deck Board Calculator — WorkTools</title>
  <link rel="stylesheet" href="../../assets/style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🪵</text></svg>">
  <style>
    .calc-panel {
      max-width: 520px;
      margin: 0 auto;
    }

    .field-row {
      display: grid;
      grid-template-columns: 110px 1fr;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .field-row label {
      font-size: 0.92rem;
      color: var(--text-muted);
    }

    .field-row .controls {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }

    .field-row select {
      flex: 1;
      min-width: 0;
      font: inherit;
      padding: 10px 8px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface-2);
      color: var(--text);
    }

    .input-group {
      display: flex;
      align-items: center;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      flex: 1;
      min-width: 0;
    }

    .input-group:focus-within {
      border-color: var(--accent);
    }

    .input-group .affix {
      padding: 0 10px;
      color: var(--text-muted);
      font-size: 0.9rem;
      user-select: none;
      white-space: nowrap;
    }

    .input-group input {
      flex: 1;
      min-width: 0;
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      font: inherit;
      font-size: 1.05rem;
      padding: 10px 12px;
      outline: none;
      -moz-appearance: textfield;
      appearance: textfield;
    }

    .input-group input::-webkit-outer-spin-button,
    .input-group input::-webkit-inner-spin-button {
      -webkit-appearance: none;
    }

    .input-group.narrow {
      flex: 0 0 130px;
    }

    .input-group.hidden {
      display: none;
    }

    .dims .controls {
      gap: 6px;
    }

    .dims .times {
      color: var(--text-muted);
      user-select: none;
    }

    .section-divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 20px 0;
    }

    .field-row.primary label {
      color: var(--text);
      font-weight: 600;
    }

    .field-row.primary .input-group {
      border-color: var(--accent);
    }

    .coverage-note {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin: 14px 0 0;
      font-variant-numeric: tabular-nums;
    }

    .hint {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin: 16px 0 0;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="site-header">
      <a class="back-link" href="../../">&larr; WorkTools</a>
      <h1 class="site-title">Deck Board Calculator</h1>
    </header>

    <main class="panel calc-panel">
      <div class="field-row">
        <label for="boardWidth">Board width</label>
        <div class="controls">
          <select id="boardWidth">
            <option value="3.5">4&quot; nominal (3.5&quot; actual)</option>
            <option value="5.5">6&quot; nominal (5.5&quot; actual)</option>
            <option value="custom">Custom&hellip;</option>
          </select>
          <div class="input-group narrow hidden" id="customWidthGroup">
            <input type="number" id="customWidth" inputmode="decimal" step="0.01" min="0.25" placeholder="5.25">
            <span class="affix">in</span>
          </div>
        </div>
      </div>

      <div class="field-row">
        <label for="gap">Gap</label>
        <div class="controls">
          <select id="gap"></select>
          <div class="input-group narrow hidden" id="customGapGroup">
            <input type="number" id="customGap" inputmode="decimal" step="0.001" min="0" placeholder="0.125">
            <span class="affix">in</span>
          </div>
        </div>
      </div>

      <div class="field-row">
        <label for="waste">Waste factor</label>
        <div class="controls">
          <div class="input-group narrow">
            <input type="number" id="waste" inputmode="decimal" step="1" min="0" value="10">
            <span class="affix">%</span>
          </div>
        </div>
      </div>

      <hr class="section-divider">

      <div class="field-row dims">
        <label for="lengthFt">Deck size</label>
        <div class="controls">
          <div class="input-group">
            <input type="number" id="lengthFt" inputmode="decimal" step="0.01" min="0" placeholder="Length">
            <span class="affix">ft</span>
          </div>
          <span class="times">&times;</span>
          <div class="input-group">
            <input type="number" id="widthFt" inputmode="decimal" step="0.01" min="0" placeholder="Width">
            <span class="affix">ft</span>
          </div>
        </div>
      </div>

      <div class="field-row primary">
        <label for="sqft">Square feet</label>
        <div class="controls">
          <div class="input-group">
            <input type="number" id="sqft" inputmode="decimal" step="0.01" min="0" placeholder="0">
            <span class="affix">sq ft</span>
          </div>
        </div>
      </div>

      <div class="field-row primary">
        <label for="lf">Lineal feet</label>
        <div class="controls">
          <div class="input-group">
            <input type="number" id="lf" inputmode="decimal" step="0.01" min="0" placeholder="0">
            <span class="affix">lin ft</span>
          </div>
        </div>
      </div>

      <p class="coverage-note" id="coverageNote"></p>

      <p class="hint">Enter deck length &times; width (or square feet directly) to get lineal feet of decking including waste — or type lineal feet to see how much area it covers.</p>
    </main>
  </div>

  <script src="calc.js"></script>
</body>
</html>
